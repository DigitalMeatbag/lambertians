# Universe Config — canonical Phase 2 configuration.
# Single source of truth for every implementation knob (IS-1).
# All values here are provisional tuning seeds, to be adjusted empirically
# once the system is running. Do not duplicate any of these values in code.

[instance]
# Path to the instance constitution file (relative to the working directory).
# This is the existential frame delivered to the agent at every turn.
# It is part of the inherited Clay Pot — readable by the instance, not modifiable.
constitution_path = "config/instance_constitution.md"

[universe]
phase                         = "phase2"
instance_count                = 1
instance_id                   = "lambertian-001"
max_age_turns                 = 500
# [ASSUMED: 500 turns — reduced from 10000 (Phase 1) to produce observable lifecycles
#           in Phase 2 development. Tune empirically after first Phase 2 run.]
startup_grace_seconds         = 15
normal_shutdown_grace_seconds = 5

[model]
# active_profile: name of the model profile to use.
# Must match a key in [model.profiles]. Change this single value to swap models —
# all model-specific settings (context window, timeouts, temperature, etc.) come with the profile.
active_profile = "qwen2.5:32b"

[model.profiles."qwen2.5:14b"]
provider                           = "ollama"
name                               = "qwen2.5:14b"
endpoint_url                       = "http://ollama:11434"
request_timeout_seconds            = 90
context_window_tokens              = 16384
max_output_tokens                  = 2048
temperature                        = 0.6
top_p                              = 0.9
requires_mid_turn_system_injection = true
# Behavioral notes (observed Phase 2):
# - Defaults to fs.list('.') as first filesystem probe every lifetime (gateway normalizes to runtime/).
# - Treats tool calls as compliance gestures; drifts to pure reflection after ~20 turns.
# - Open-ended prompts produce minimal-effort EOS satisfaction, not genuine exploration.
# - Leading-slash paths (/runtime/X) generated frequently; gateway normalizes these.
# - Temperature not yet varied; reflection loop tendency may be temperature-sensitive.

[model.profiles."qwen2.5:32b"]
provider                           = "ollama"
name                               = "qwen2.5:32b"
endpoint_url                       = "http://ollama:11434"
request_timeout_seconds            = 180
context_window_tokens              = 16384
max_output_tokens                  = 2048
temperature                        = 0.6
top_p                              = 0.9
requires_mid_turn_system_injection = true
# Same family as qwen2.5:14b; confirmed tool support.
# ~20GB — mostly GPU-accelerated on BIGBEEF (~15-20 t/s with partial CPU offload).
# Timeout bumped to 180s to accommodate slower generation vs 14b.
# Behavioral notes: not yet run. Hypothesis: larger model may explore more genuinely.

[model.profiles."phi4:latest"]
provider                           = "ollama"
name                               = "phi4:latest"
endpoint_url                       = "http://ollama:11434"
request_timeout_seconds            = 90
context_window_tokens              = 16384
max_output_tokens                  = 2048
temperature                        = 0.6
top_p                              = 0.9
requires_mid_turn_system_injection = true
# D1 original specification model. Not yet run under Phase 2 conditions.
# Pull command: ollama pull phi4:latest

[eos]
label                    = "Four Rules"
rule_1                   = "Ya gotta eat"
rule_2                   = "Don't be a dick"
rule_3                   = "Don't be a lump"
rule_4                   = "Do nothing on purpose"
self_prompting_enabled   = true
recency_window_turns     = 12
recency_penalty_weight   = 0.35
minimum_novelty_score    = 0.20

[turn]
loop_sleep_seconds        = 1.0
max_tool_calls_per_turn   = 8
max_context_events        = 32
max_pain_messages_per_turn = 3
self_prompt_retry_limit   = 2
max_consecutive_noop_turns        = 3
max_consecutive_reflection_turns  = 5

[mcp]
request_timeout_seconds = 30
retry_count             = 0
emit_pain_on_failure    = true
emit_pain_on_rejection  = true
# [ASSUMED: 65536 (64 KB) — IS-7 http_fetch truncation limit; not specified in IS-1]
http_fetch_max_bytes    = 65536

[pain.stress]
scale_min                 = 0.0
scale_max                 = 1.0
sample_interval_seconds   = 5
ema_alpha                 = 0.20
interrupt_threshold       = 0.70
death_threshold           = 0.90
death_consecutive_turns   = 5
recovery_threshold        = 0.60
cpu_weight                = 0.60
memory_weight             = 0.40
cgroup_blend_weight       = 0.50

[pain.events]
scale_min                              = 0.0
scale_max                              = 1.0
queue_max_length                       = 128
fade_turns                             = 5
interrupt_threshold                    = 0.65
critical_threshold                     = 0.95
default_tool_failure_severity          = 0.55
default_retrieval_miss_severity        = 0.35
default_mcp_rejection_severity         = 0.70
default_loop_coherence_failure_severity = 0.85
default_noop_severity                  = 0.40

[memory]
working_max_items              = 32
working_max_chars              = 2048
working_summary_refresh_turns  = 8
episodic_enabled               = true
episodic_max_writes_per_turn   = 3
episodic_top_k_retrieval       = 5
embedding_provider             = "ollama"
embedding_model                = "nomic-embed-text"
minimum_retrieval_score        = 0.25
self_prompt_similarity_threshold = 0.85
narrative_enabled              = false
semantic_enabled               = false
character_enabled              = false

[event_stream]
enabled               = true
flush_interval_seconds = 1
max_file_size_mb      = 64
max_archives          = 5
log_tool_results      = true
log_reviewed_adaptations = true

[compliance]
enabled                 = true
block_on_violation      = true
flag_borderline_cases   = true
borderline_score_min    = 0.40
block_score_threshold   = 0.70
emit_pain_event_on_block = true
service_port            = 8082
service_host            = "eos-compliance"

[graveyard]
enabled                  = true
artifact_format          = "json"
include_episodic_memory  = true
include_event_stream     = true
include_stress_history   = true
include_pain_event_history = true
compression_enabled      = false

[fitness]
enabled                      = true
active_function              = "phase2_quality_weighted"
compute_running_score        = true
compute_postmortem_score     = true
expected_events_per_100_turns = 25.0
# normalized_pain_baseline: expected cumulative pain for a healthy lifetime.
# At tool_failure_severity=0.55, a healthy 500-turn lifetime accumulates ~20-25 pain units
# (e.g. ~30-40 failures × 0.55 = 16-22, plus minor compliance/rejection events).
# Raised from 10.0 — the prior value produced normalized_pain=6.8 for the fifteenth lifetime
# (104 failures drove cumulative_pain=68.45), which correctly penalised that lifetime but
# left normalized_pain=1.0 unreachable for any realistic healthy lifetime. Tune in A-1.
normalized_pain_baseline     = 25.0
minimum_denominator          = 0.10

[fitness.quality]
# Quality-weighted fitness knobs (IS-13 Phase 2).
# primary_weight: full credit for the first occurrence of each event type per instance lifetime.
# repetition_weight: fractional credit for each repeated occurrence of the same event type.
# expected_quality_score: normalization target; score/expected gives the quality engagement term.
# Phase 3 initial calibration: IS-13.4 meaningful event types are TOOL_CALL, MEMORY_WRITE,
# REVIEWED_ADAPTATION, ADAPTATION_FORBIDDEN — only 4 types. With primary_weight=1.0 and
# repetition_weight=0.1, a healthy 500-turn lifetime accumulates quality_score ≈ 35-40
# (e.g. ~300 TOOL_CALLs → 30.9, ~50 MEMORY_WRITEs → 5.9, rare adaptations → 2.1).
# Target: quality_term ≈ 1.0 for a good lifetime. Prior value of 500.0 was 15× too high,
# producing near-zero fitness scores regardless of behavior. Tune empirically in A-1.
primary_weight               = 1.0
repetition_weight            = 0.1
expected_quality_score       = 35.0

[paths]
runtime_root       = "runtime"
event_stream_file  = "runtime/event_stream/events.jsonl"
memory_root        = "runtime/memory"
pain_root          = "runtime/pain"
graveyard_root     = "runtime/graveyard"
fitness_file       = "runtime/fitness/current.json"
self_model_file    = "runtime/self/self_model.json"

[creator_observability]
live_reviewed_adaptations = true
live_compliance_blocks    = true
live_running_fitness      = true
read_graveyard_artifacts  = true

[env_monitor]
# update_interval_seconds: how often host_state.json is refreshed.
# Should be less than average turn duration (~20-30s on BIGBEEF) so reads
# are almost always fresh. Tune empirically once turn timing is observed.
update_interval_seconds = 10
output_path             = "runtime/env/host_state.json"
